apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Reduce storage for dev
  - target:
      kind: PersistentVolumeClaim
      name: prometheus-data
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
  - target:
      kind: PersistentVolumeClaim
      name: loki-data
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
  - target:
      kind: PersistentVolumeClaim
      name: tempo-data
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi
  # Dev ingress hostnames
  - target:
      kind: Ingress
      name: monitoring-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: grafana.dev.monitoring.local
      - op: replace
        path: /spec/rules/1/host
        value: prometheus.dev.monitoring.local
