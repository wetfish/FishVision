apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo-config.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 4320
      log_level: info
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4318"
            http:
              endpoint: "0.0.0.0:4319"
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
      trace_idle_period: 5m
      max_block_duration: 1h
    storage:
      trace:
        backend: local
        local:
          path: /tempo-data/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: tempo
          image: grafana/tempo:2.5.0
          args:
            - -config.file=/etc/tempo/tempo-config.yaml
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4318
              name: otlp-grpc
            - containerPort: 4319
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/tempo/tempo-config.yaml
              subPath: tempo-config.yaml
            - name: data
              mountPath: /tempo-data
          livenessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring
spec:
  selector:
    app: tempo
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 4318
      targetPort: 4318
      name: otlp-grpc
    - port: 4319
      targetPort: 4319
      name: otlp-http
