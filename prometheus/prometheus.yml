global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Web-Services nodes ---
  - job_name: "web-services-node"
    static_configs:
      - targets: ["107.191.43.166:9100"]
        labels:
          environment: staging
          project: web-services
      - targets: ["149.28.239.165:9100"]
        labels:
          environment: production
          project: web-services

  - job_name: "testforums"
    static_configs:
      - targets: ["144.202.63.236:9100"]
        labels:
          environment: production
          project: web-services

  # --- Factory nodes ---
  - job_name: "factory-staging-node"
    static_configs:
      - targets: ["45.76.235.77:9100"]
        labels:
          environment: staging
          project: factory

  - job_name: "factory-prod-node"
    static_configs:
      - targets: ["104.156.237.105:9100"]
        labels:
          environment: production
          project: factory

  # --- Factory MySQL exporter ---
  # staging: NodePort 30104 (k8s RKE2), prod: direct port 9104
  - job_name: "factory-mysql-staging"
    static_configs:
      - targets: ["45.76.235.77:30104"]
        labels:
          environment: staging
          project: factory

  - job_name: "factory-mysql-prod"
    static_configs:
      - targets: ["104.156.237.105:9104"]
        labels:
          environment: production
          project: factory

  # --- Factory Redis exporter ---
  # staging: NodePort 30121, prod: direct port 9121
  - job_name: "factory-redis-staging"
    static_configs:
      - targets: ["45.76.235.77:30121"]
        labels:
          environment: staging
          project: factory

  - job_name: "factory-redis-prod"
    static_configs:
      - targets: ["104.156.237.105:9121"]
        labels:
          environment: production
          project: factory

  # --- Factory Nginx exporter ---
  # staging: NodePort 30113, prod: direct port 9113
  - job_name: "factory-nginx-staging"
    static_configs:
      - targets: ["45.76.235.77:30113"]
        labels:
          environment: staging
          project: factory

  - job_name: "factory-nginx-prod"
    static_configs:
      - targets: ["104.156.237.105:9113"]
        labels:
          environment: production
          project: factory

  # --- Web-Services Traefik metrics ---
  - job_name: "web-services-traefik"
    static_configs:
      - targets: ["107.191.43.166:8082"]
        labels:
          environment: staging
          project: web-services
      - targets: ["149.28.239.165:8082"]
        labels:
          environment: production
          project: web-services

  # --- Observability stack self-monitoring ---
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # --- Web-Services-K8s Prometheus federation ---
  # Uncomment when web-services-k8s Prometheus federation endpoint is available
  # - job_name: "web-services-k8s-federation"
  #   honor_labels: true
  #   metrics_path: /federate
  #   params:
  #     match[]:
  #       - '{job=~".+"}'
  #   static_configs:
  #     - targets: ["<web-services-k8s-prometheus>:9090"]
