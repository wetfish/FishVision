http_host: 0.0.0.0
http_port: 8010

irc_host: irc.wetfish.net
irc_port: 6697
use_tls: true
irc_verify_ssl: yes
irc_nickname: alertbot
irc_nickname_password: ${IRC_NICKSERV_PASS}
irc_realname: "Prometheus Alert Bot"

irc_channels:
  - name: "#alerts"

alert_buffer_size: 2048
msg_once_per_alert_group: no
use_privmsg: yes

msg_template: |
  {{ if eq .Status "firing" }}🔴 FIRING{{ else }}🟢 RESOLVED{{ end }} [{{ .Labels.severity }}] {{ .Labels.alertname }} — {{ .Annotations.summary }}
  {{ .Annotations.description }}
  {{ if .Labels.project }}Project: {{ .Labels.project }} | {{ end }}Instance: {{ .Labels.instance }} | Duration: {{ .StartsAt.Format "15:04:05 UTC" }}
  {{ if .Annotations.grafana_url }}Dashboard: {{ .Annotations.grafana_url }}{{ end }}
  {{ if .Annotations.logs_url }}Logs: {{ .Annotations.logs_url }}{{ end }}
  {{ if .Annotations.runbook }}Runbook: {{ .Annotations.runbook }}{{ end }}
