services:
  # -----------------------------
  # Prometheus - Metrics
  # -----------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      alertmanager:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://prometheus:9090/-/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Alertmanager - Alerts
  # -----------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://alertmanager:9093/-/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Grafana - Dashboards / Visualization
  # -----------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_LOG_LEVEL: info
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://grafana:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Loki - Logs aggregation (commented out)
  # -----------------------------
  # loki:
  #   image: grafana/loki:latest
  #   container_name: loki
  #   ports:
  #     - "3100:3100"
  #   command:
  #     - -config.file=/etc/loki/loki-config.yaml
  #   volumes:
  #     - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
  #     - loki-data:/loki
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget --spider -q http://loki:3100/ready || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # -----------------------------
  # Tempo - Traces aggregation
  # -----------------------------
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    ports:
      - "3200:3200" # HTTP API
      - "4317:4317" # OTLP gRPC
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - ./tempo-data:/tempo-data
    command:
      - -config.file=/etc/tempo/tempo-config.yaml
    restart: unless-stopped
    user: "10001:10001" # fixes permission denied on /tempo-data
    #healthcheck:
    #  test: ["CMD-SHELL", "wget --spider -q http://tempo:3200/ready || exit 1"]
    #  interval: 10s
    #  timeout: 5s
    #  retries: 5

  # -----------------------------
  # IRC relay - for alert notifications
  # -----------------------------
  irc-relay:
    build:
      context: ./irc-deamon
      dockerfile: Dockerfile.irc
    container_name: irc-relay
    ports:
      - "8010:8010"
    volumes:
      - ./irc-deamon/config.yml:/etc/alertmanager-irc-relay/config.yml:ro
    command: ["--config", "/etc/alertmanager-irc-relay/config.yml"]
    restart: unless-stopped

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-storage:
  tempo-data:
  loki-data:
